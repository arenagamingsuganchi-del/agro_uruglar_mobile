name: Build Flutter iOS App

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Flutter SDK
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: true

    - name: Generate iOS Platform Files (Safe Backup)
      run: |
        mkdir -p temp_lib
        cp -R lib/ temp_lib/
        flutter create --platforms=ios --project-name=agro_uruglar_mobile .
        rm -rf lib
        mv temp_lib lib

    - name: Get packages
      run: flutter pub get

    - name: Build iOS App (Unsigned)
      run: |
        flutter build ios --release --no-codesign

    - name: Zip Build Output
      run: |
        cd build/ios/iphoneos
        zip -r Agro-Uruglar-iOS.zip Runner.app

    - name: Upload App Bundle
      uses: actions/upload-artifact@v4
      with:
        name: Agro-Uruglar-iOS-App
        path: build/ios/iphoneos/Agro-Uruglar-iOS.zip
        retention-days: 7
